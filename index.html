<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <title>💙 Saúde Pessoal</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyBSLxUBuDiGRi1pLb6ta_sqqondYD96G7A",
      authDomain: "hisaude-c5819.firebaseapp.com",
      databaseURL: "https://hisaude-c5819-default-rtdb.firebaseio.com",
      projectId: "hisaude-c5819",
      storageBucket: "hisaude-c5819.firebasestorage.app",
      messagingSenderId: "825247112507",
      appId: "1:825247112507:web:66e1eb86ca15cbeb0e6b1e",
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window._fbSet = (data) => set(ref(db, "saude"), data);
    window._fbGet = () => get(ref(db, "saude")).then(s => s.exists() ? s.val() : null);
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#f8faff; font-family:'Nunito',sans-serif; }
    select, input, textarea { font-family:'Nunito',sans-serif; }
    ::-webkit-scrollbar { width:0; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const DRIVE_FILE = "saude_pessoal_dados.json";
const CATEGORIAS = [
  { id:"exame",         label:"Exame",        icon:"🧪", color:"#0ea5e9" },
  { id:"bioimpedancia", label:"Bioimpedância", icon:"⚖️", color:"#8b5cf6" },
  { id:"atestado",      label:"Atestado",      icon:"📋", color:"#f59e0b" },
  { id:"receita",       label:"Receita",       icon:"💊", color:"#ec4899" },
  { id:"outro",         label:"Outro",         icon:"📎", color:"#64748b" },
];
const CORES = ["#ef4444","#f97316","#eab308","#22c55e","#0ea5e9","#6366f1","#ec4899","#14b8a6"];

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const iniciais = (n="") => n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();
const fmtData = (iso) => iso ? new Date(iso).toLocaleDateString("pt-BR") : "";
const catDe = (id) => CATEGORIAS.find(c=>c.id===id) || CATEGORIAS[4];

async function carregarDrive() {
  return await window._fbGet();
}

async function salvarDrive(dados) {
  await window._fbSet(dados);
}

function Avatar({ nome, corIdx, tam=44 }) {
  const bg = CORES[corIdx % CORES.length];
  return (
    <div style={{ width:tam, height:tam, borderRadius:"50%", background:bg, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:tam*0.36, color:"#fff", boxShadow:`0 2px 10px ${bg}55` }}>
      {iniciais(nome)}
    </div>
  );
}

function Spinner() {
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:14, padding:56 }}>
      <div style={{ width:40, height:40, borderRadius:"50%", border:"3px solid #e0e7ff", borderTopColor:"#6366f1", animation:"spin 0.8s linear infinite" }}/>
      <span style={{ color:"#94a3b8", fontSize:13, fontWeight:700 }}>Carregando do Drive…</span>
    </div>
  );
}

function Toast({ msg, tipo }) {
  if (!msg) return null;
  const bg = { success:"#22c55e", error:"#ef4444", info:"#6366f1" }[tipo]||"#6366f1";
  return (
    <div style={{ position:"fixed", bottom:88, left:"50%", transform:"translateX(-50%)", background:bg, color:"#fff", padding:"10px 20px", borderRadius:12, fontSize:13, fontWeight:800, boxShadow:"0 4px 20px rgba(0,0,0,0.15)", zIndex:9999, animation:"fadeUp 0.3s ease", whiteSpace:"nowrap" }}>
      {msg}
    </div>
  );
}

function Pill({ color, children }) {
  return (
    <span style={{ background:color+"18", border:`1px solid ${color}33`, borderRadius:20, padding:"4px 10px", fontSize:11, color, fontWeight:800, display:"inline-flex", alignItems:"center", gap:4 }}>
      {children}
    </span>
  );
}

function App() {
  const [dados, setDados]           = useState({ perfis:[], docs:[] });
  const [carregando, setCarregando] = useState(true);
  const [salvando, setSalvando]     = useState(false);
  const [perfil, setPerfil]         = useState(null);
  const [tela, setTela]             = useState("home");
  const [filtro, setFiltro]         = useState("all");
  const [toast, setToast]           = useState({ msg:"", tipo:"info" });
  const [novoDoc, setNovoDoc]       = useState({ nome:"", categoria:"exame", data:"", obs:"", fileData:null, fileName:null });
  const [novoPerfil, setNovoPerfil] = useState({ nome:"", nascimento:"", sexo:"", corIdx:0 });
  const fileRef = useRef();

  const mostrarToast = (msg, tipo="info", ms=3000) => { setToast({ msg, tipo }); setTimeout(()=>setToast({ msg:"", tipo:"info" }), ms); };

  useEffect(()=>{
    (async()=>{
      try {
        const d = await carregarDrive();
        if (d) { setDados(d); if(d.perfis?.length) setPerfil(d.perfis[0]); mostrarToast("Dados carregados ✓","success"); }
        else mostrarToast("Bem-vindo! Crie seu primeiro perfil 👋","info",4000);
      } catch(e) { mostrarToast("Erro ao conectar ao Drive","error"); }
      finally { setCarregando(false); }
    })();
  },[]);

  const salvar = useCallback(async(d)=>{
    setSalvando(true);
    try { await salvarDrive(d); mostrarToast("Salvo no Drive ✓","success"); }
    catch(e) { mostrarToast("Erro ao salvar","error"); }
    finally { setSalvando(false); }
  },[]);

  const atualizar = (novo) => { setDados(novo); salvar(novo); };

  const adicionarPerfil = () => {
    if (!novoPerfil.nome.trim()) return;
    const p = { id:uid(), ...novoPerfil, nome:novoPerfil.nome.trim() };
    const novo = { ...dados, perfis:[...dados.perfis, p] };
    atualizar(novo); if (!perfil) setPerfil(p);
    setNovoPerfil({ nome:"", nascimento:"", sexo:"", corIdx:Math.floor(Math.random()*CORES.length) });
    setTela("home");
  };
  const removerPerfil = (id) => {
    if (!window.confirm("Remover este perfil e todos os seus documentos?")) return;
    const novo = { perfis:dados.perfis.filter(p=>p.id!==id), docs:dados.docs.filter(d=>d.perfilId!==id) };
    atualizar(novo); if (perfil?.id===id) setPerfil(novo.perfis[0]||null); setTela("home");
  };
  const adicionarDoc = () => {
    if (!novoDoc.nome.trim()||!perfil) return;
    const doc = { id:uid(), perfilId:perfil.id, criadoEm:new Date().toISOString(), ...novoDoc, nome:novoDoc.nome.trim() };
    const novo = { ...dados, docs:[...dados.docs, doc] };
    atualizar(novo);
    setNovoDoc({ nome:"", categoria:"exame", data:"", obs:"", fileData:null, fileName:null });
    setTela("docs");
  };
  const removerDoc = (id) => { if (!window.confirm("Remover?")) return; atualizar({ ...dados, docs:dados.docs.filter(d=>d.id!==id) }); };
  const handleArquivo = (e) => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ev => setNovoDoc(d=>({...d, fileData:ev.target.result, fileName:f.name}));
    r.readAsDataURL(f);
  };

  const docsFiltrados = dados.docs.filter(d=>d.perfilId===perfil?.id).filter(d=>filtro==="all"||d.categoria===filtro);

  const C = { bg:"#f8faff", card:"#ffffff", borda:"#e2e8f0", acento:"#6366f1", acentoSuave:"#eef2ff", texto:"#1e293b", textoMed:"#475569", textoSuave:"#94a3b8" };
  const estiloInput = { width:"100%", background:"#f1f5fb", border:`1.5px solid ${C.borda}`, borderRadius:12, padding:"12px 14px", color:C.texto, fontSize:14, fontWeight:600, outline:"none" };
  const estiloLabel = { fontSize:11, color:C.textoSuave, marginBottom:5, display:"block", fontWeight:800, letterSpacing:"0.5px", textTransform:"uppercase" };
  const estiloCard  = { background:C.card, border:`1px solid ${C.borda}`, borderRadius:16, padding:16, marginBottom:10, boxShadow:"0 1px 4px rgba(0,0,0,0.04)" };
  const estiloBtn   = (bg=C.acento,cor="#fff") => ({ background:bg, color:cor, border:"none", borderRadius:12, padding:"13px 18px", fontSize:14, fontWeight:800, cursor:"pointer", width:"100%", opacity:salvando?0.7:1 });

  const voltarPara = tela==="add-doc"?"docs":tela==="add-perfil"?"home":"home";

  return (
    <div style={{ minHeight:"100vh", background:C.bg, paddingBottom:80 }}>
      {/* Header */}
      <div style={{ background:"#fff", borderBottom:`1px solid ${C.borda}`, padding:"16px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100, boxShadow:"0 1px 8px rgba(99,102,241,0.06)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          {tela!=="home" && <button onClick={()=>setTela(voltarPara)} style={{ background:"none", border:"none", color:C.textoMed, fontSize:24, cursor:"pointer", paddingRight:8 }}>‹</button>}
          <div>
            <div style={{ fontSize:17, fontWeight:800, color:C.texto }}>
              {tela==="home"&&"💙 Saúde Pessoal"}{tela==="docs"&&(perfil?.nome||"Documentos")}{tela==="add-doc"&&"Novo Documento"}{tela==="add-perfil"&&"Novo Perfil"}
            </div>
            <div style={{ fontSize:11, color:C.textoSuave, fontWeight:700 }}>{salvando?"⟳ Sincronizando…":"☁️ Google Drive conectado"}</div>
          </div>
        </div>
        {tela==="home"&&<button onClick={()=>salvar(dados)} style={{ background:C.acentoSuave, border:"none", borderRadius:10, padding:"6px 12px", color:C.acento, fontWeight:800, fontSize:12, cursor:"pointer" }}>{salvando?"⟳":"↑ Sync"}</button>}
      </div>

      {/* Conteúdo */}
      {carregando ? <Spinner/> : (
        <div style={{ padding:"0 16px" }}>
          {/* HOME */}
          {tela==="home" && <>
            <div style={{ background:"linear-gradient(135deg,#eef2ff,#f0fdf4)", borderRadius:20, padding:"24px 20px 20px", margin:"16px 0 20px", border:"1px solid #e0e7ff" }}>
              <div style={{ fontSize:28, marginBottom:4 }}>💙</div>
              <div style={{ fontFamily:"'Lora',serif", fontSize:22, fontWeight:600, color:C.texto, lineHeight:1.2 }}>Prontuário<br/><em style={{ color:C.acento }}>Pessoal</em></div>
              <div style={{ fontSize:13, color:C.textoMed, marginTop:8, fontWeight:600 }}>{dados.perfis.length} perfil{dados.perfis.length!==1?"s":""} • {dados.docs.length} documento{dados.docs.length!==1?"s":""}</div>
            </div>
            <div style={estiloLabel}>Perfis da família</div>
            {dados.perfis.length===0 && <div style={{ ...estiloCard, textAlign:"center", color:C.textoSuave, padding:28, fontSize:13 }}>Nenhum perfil ainda. Adicione o primeiro! 👇</div>}
            {dados.perfis.map(p=>(
              <div key={p.id} onClick={()=>{ setPerfil(p); setTela("docs"); }} style={{ ...estiloCard, display:"flex", alignItems:"center", gap:14, cursor:"pointer", border:perfil?.id===p.id?`1.5px solid ${C.acento}`:estiloCard.border, background:perfil?.id===p.id?C.acentoSuave:C.card }}>
                <Avatar nome={p.nome} corIdx={p.corIdx}/>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:800, fontSize:15 }}>{p.nome}</div>
                  <div style={{ fontSize:12, color:C.textoSuave, marginTop:2 }}>{p.nascimento?fmtData(p.nascimento):"Sem data"}{p.sexo?` • ${p.sexo}`:""}</div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
                  <Pill color={C.acento}>{dados.docs.filter(d=>d.perfilId===p.id).length} docs</Pill>
                  <span style={{ fontSize:18, color:C.textoSuave }}>›</span>
                </div>
              </div>
            ))}
            <button style={estiloBtn(C.acento)} onClick={()=>setTela("add-perfil")}>+ Adicionar Perfil</button>
          </>}

          {/* DOCS */}
          {tela==="docs" && <>
            {perfil && (
              <div style={{ ...estiloCard, background:"linear-gradient(135deg,#eef2ff,#f0fdf4)", border:"1.5px solid #c7d2fe", marginTop:16, display:"flex", alignItems:"center", gap:14 }}>
                <Avatar nome={perfil.nome} corIdx={perfil.corIdx} tam={50}/>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:800, fontSize:16 }}>{perfil.nome}</div>
                  <div style={{ fontSize:12, color:C.textoMed }}>{perfil.nascimento?fmtData(perfil.nascimento):""}{perfil.sexo?` • ${perfil.sexo}`:""}</div>
                </div>
                <button onClick={()=>removerPerfil(perfil.id)} style={{ background:"none", border:"none", color:"#ef4444", fontSize:18, cursor:"pointer" }}>🗑</button>
              </div>
            )}
            <div style={{ display:"flex", gap:6, overflowX:"auto", padding:"12px 0", scrollbarWidth:"none" }}>
              {[{ id:"all", label:"Todos", icon:"📂", color:C.textoMed },...CATEGORIAS].map(c=>(
                <button key={c.id} onClick={()=>setFiltro(c.id)} style={{ background:filtro===c.id?(c.color||C.acento)+"18":"#f1f5fb", border:`1.5px solid ${filtro===c.id?(c.color||C.acento)+"44":C.borda}`, borderRadius:20, padding:"5px 12px", fontSize:11, color:filtro===c.id?(c.color||C.acento):C.textoSuave, fontWeight:800, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0 }}>
                  {c.icon} {c.label}
                </button>
              ))}
            </div>
            {docsFiltrados.length===0 && <div style={{ ...estiloCard, textAlign:"center", color:C.textoSuave, padding:28, fontSize:13 }}>Nenhum documento nesta categoria.</div>}
            {docsFiltrados.map(doc=>{
              const cat=catDe(doc.categoria);
              return (
                <div key={doc.id} style={estiloCard}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8, flexWrap:"wrap" }}>
                        <Pill color={cat.color}>{cat.icon} {cat.label}</Pill>
                        {doc.data&&<span style={{ fontSize:11, color:C.textoSuave, fontWeight:700 }}>{fmtData(doc.data)}</span>}
                      </div>
                      <div style={{ fontWeight:800, fontSize:14, marginBottom:4 }}>{doc.nome}</div>
                      {doc.obs&&<div style={{ fontSize:12, color:C.textoMed, lineHeight:1.5 }}>{doc.obs}</div>}
                      {doc.fileName&&<a href={doc.fileData} download={doc.fileName} style={{ display:"inline-flex", alignItems:"center", gap:4, marginTop:8, fontSize:12, color:C.acento, textDecoration:"none", fontWeight:700 }}>📎 {doc.fileName}</a>}
                    </div>
                    <button onClick={()=>removerDoc(doc.id)} style={{ background:"none", border:"none", color:"#ef4444", fontSize:16, cursor:"pointer" }}>🗑</button>
                  </div>
                </div>
              );
            })}
            <button style={{ ...estiloBtn(C.acento), marginTop:6 }} onClick={()=>setTela("add-doc")}>+ Adicionar Documento</button>
          </>}

          {/* ADD DOC */}
          {tela==="add-doc" && <>
            <div style={{ fontFamily:"'Lora',serif", fontSize:20, fontWeight:600, color:C.texto, margin:"16px 0 20px" }}>Novo Documento</div>
            <div style={{ marginBottom:14 }}><label style={estiloLabel}>Nome / Descrição *</label><input style={estiloInput} placeholder="Ex: Hemograma completo" value={novoDoc.nome} onChange={e=>setNovoDoc(d=>({...d,nome:e.target.value}))}/></div>
            <div style={{ marginBottom:14 }}><label style={estiloLabel}>Categoria</label><select style={estiloInput} value={novoDoc.categoria} onChange={e=>setNovoDoc(d=>({...d,categoria:e.target.value}))}>{CATEGORIAS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select></div>
            <div style={{ marginBottom:14 }}><label style={estiloLabel}>Data do documento</label><input style={estiloInput} type="date" value={novoDoc.data} onChange={e=>setNovoDoc(d=>({...d,data:e.target.value}))}/></div>
            <div style={{ marginBottom:14 }}><label style={estiloLabel}>Observações</label><textarea style={{ ...estiloInput, minHeight:80, resize:"vertical" }} placeholder="Médico, resultado…" value={novoDoc.obs} onChange={e=>setNovoDoc(d=>({...d,obs:e.target.value}))}/></div>
            <div style={{ marginBottom:20 }}>
              <label style={estiloLabel}>Arquivo (PDF, imagem…)</label>
              <input ref={fileRef} type="file" accept="image/*,.pdf" style={{ display:"none" }} onChange={handleArquivo}/>
              <button style={{ ...estiloBtn("#f1f5fb",C.acento), border:`1.5px dashed ${C.borda}` }} onClick={()=>fileRef.current.click()}>{novoDoc.fileName?`📎 ${novoDoc.fileName}`:"📂 Selecionar arquivo"}</button>
            </div>
            <button style={estiloBtn(C.acento)} onClick={adicionarDoc} disabled={salvando}>{salvando?"Salvando…":"Salvar documento"}</button>
          </>}

          {/* ADD PERFIL */}
          {tela==="add-perfil" && <>
            <div style={{ fontFamily:"'Lora',serif", fontSize:20, fontWeight:600, color:C.texto, margin:"16px 0 20px" }}>Novo Perfil</div>
            <div style={{ marginBottom:14 }}><label style={estiloLabel}>Nome completo *</label><input style={estiloInput} placeholder="Ex: Renata Silva" value={novoPerfil.nome} onChange={e=>setNovoPerfil(p=>({...p,nome:e.target.value}))}/></div>
            <div style={{ marginBottom:14 }}><label style={estiloLabel}>Data de nascimento</label><input style={estiloInput} type="date" value={novoPerfil.nascimento} onChange={e=>setNovoPerfil(p=>({...p,nascimento:e.target.value}))}/></div>
            <div style={{ marginBottom:14 }}><label style={estiloLabel}>Sexo</label>
              <select style={estiloInput} value={novoPerfil.sexo} onChange={e=>setNovoPerfil(p=>({...p,sexo:e.target.value}))}>
                <option value="">Preferir não dizer</option><option value="Feminino">Feminino</option><option value="Masculino">Masculino</option><option value="Outro">Outro</option>
              </select>
            </div>
            <div style={{ marginBottom:24 }}>
              <label style={estiloLabel}>Cor do avatar</label>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
                {CORES.map((c,i)=>(
                  <div key={i} onClick={()=>setNovoPerfil(p=>({...p,corIdx:i}))} style={{ width:32, height:32, borderRadius:"50%", background:c, cursor:"pointer", outline:novoPerfil.corIdx===i?`3px solid ${C.acento}`:"3px solid transparent", outlineOffset:2, transition:"outline 0.1s" }}/>
                ))}
              </div>
              {novoPerfil.nome&&<Avatar nome={novoPerfil.nome} corIdx={novoPerfil.corIdx} tam={56}/>}
            </div>
            <button style={estiloBtn(C.acento)} onClick={adicionarPerfil} disabled={salvando}>{salvando?"Salvando…":"Criar perfil"}</button>
          </>}
        </div>
      )}

      {/* Nav */}
      <nav style={{ position:"fixed", bottom:0, left:0, right:0, background:"#fff", borderTop:`1px solid ${C.borda}`, display:"flex", justifyContent:"space-around", padding:"10px 0 16px", zIndex:200, boxShadow:"0 -1px 12px rgba(99,102,241,0.08)" }}>
        {[
          { t:"home",    icon:"🏠", label:"Perfis",     ok:true },
          { t:"docs",    icon:"📁", label:"Documentos",  ok:!!perfil },
          { t:"add-doc", icon:"➕", label:"Novo",        ok:!!perfil },
        ].filter(n=>n.ok).map(n=>(
          <button key={n.t} onClick={()=>setTela(n.t)} style={{ background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, color:tela===n.t?C.acento:C.textoSuave, fontSize:10, fontWeight:800 }}>
            <span style={{ fontSize:22 }}>{n.icon}</span>{n.label}
          </button>
        ))}
        <button onClick={()=>salvar(dados)} disabled={salvando} style={{ background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, color:C.textoSuave, fontSize:10, fontWeight:800 }}>
          <span style={{ fontSize:22 }}>{salvando?"⟳":"☁️"}</span>Drive
        </button>
      </nav>

      <Toast msg={toast.msg} tipo={toast.tipo}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
