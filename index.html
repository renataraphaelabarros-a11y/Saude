<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <title>💙 Saúde Pessoal</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#f8faff;font-family:'Nunito',sans-serif;color:#1e293b;}
    input,select,textarea,button{font-family:'Nunito',sans-serif;}
    ::-webkit-scrollbar{width:0;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

    /* Layout */
    #app{min-height:100vh;padding-bottom:80px;}
    .header{background:#fff;border-bottom:1px solid #e2e8f0;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(99,102,241,0.06);}
    .header-title{font-size:17px;font-weight:800;color:#1e293b;}
    .header-sub{font-size:11px;color:#94a3b8;font-weight:700;margin-top:1px;}
    .content{padding:0 16px;}
    .nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;justify-content:space-around;padding:10px 0 16px;z-index:200;box-shadow:0 -1px 12px rgba(99,102,241,0.08);}
    .nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:800;padding:0 12px;}
    .nav-btn.ativo{color:#6366f1;}
    .nav-btn:not(.ativo){color:#94a3b8;}
    .nav-btn span{font-size:22px;}

    /* Cards */
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
    .card.ativo{border:1.5px solid #6366f1;background:#eef2ff;}
    .hero{background:linear-gradient(135deg,#eef2ff,#f0fdf4);border-radius:20px;padding:24px 20px 20px;margin:16px 0 20px;border:1px solid #e0e7ff;}
    .hero-title{font-family:'Lora',serif;font-size:22px;font-weight:600;color:#1e293b;line-height:1.2;}
    .hero-title em{color:#6366f1;}
    .hero-count{font-size:13px;color:#475569;margin-top:8px;font-weight:600;}

    /* Form */
    .label{font-size:11px;color:#94a3b8;margin-bottom:5px;display:block;font-weight:800;letter-spacing:.5px;text-transform:uppercase;}
    .input{width:100%;background:#f1f5fb;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px 14px;color:#1e293b;font-size:14px;font-weight:600;outline:none;}
    .btn{background:#6366f1;color:#fff;border:none;border-radius:12px;padding:13px 18px;font-size:14px;font-weight:800;cursor:pointer;width:100%;margin-top:4px;}
    .btn-outline{background:#f1f5fb;color:#6366f1;border:1.5px dashed #e2e8f0;}
    .btn-sm{background:#eef2ff;color:#6366f1;border:none;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer;}
    .btn-back{background:none;border:none;color:#475569;font-size:24px;cursor:pointer;padding-right:8px;}
    .btn-delete{background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer;}

    /* Pill */
    .pill{border-radius:20px;padding:4px 10px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px;}

    /* Avatar */
    .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0;}

    /* Filtros */
    .filtros{display:flex;gap:6px;overflow-x:auto;padding:12px 0;scrollbar-width:none;}
    .filtro-btn{border-radius:20px;padding:5px 12px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1.5px solid #e2e8f0;background:#f1f5fb;color:#94a3b8;}
    .filtro-btn.ativo{background:var(--cor)18;border-color:var(--cor)44;color:var(--cor);}

    /* Login */
    #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center;background:linear-gradient(135deg,#eef2ff,#f0fdf4);}
    #login-screen h1{font-family:'Lora',serif;font-size:28px;font-weight:600;color:#1e293b;margin-bottom:8px;}
    #login-screen p{color:#64748b;font-size:14px;margin-bottom:32px;font-weight:600;}

    /* Spinner */
    .spinner{display:flex;flex-direction:column;align-items:center;gap:14px;padding:56px;}
    .spinner-circle{width:40px;height:40px;border-radius:50%;border:3px solid #e0e7ff;border-top-color:#6366f1;animation:spin .8s linear infinite;}
    .spinner-txt{color:#94a3b8;font-size:13px;font-weight:700;}

    /* Toast */
    .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:800;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:9999;animation:fadeUp .3s ease;white-space:nowrap;}

    /* Cores avatar */
    .cor-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
    .cor-circulo{width:32px;height:32px;border-radius:50%;cursor:pointer;outline:3px solid transparent;outline-offset:2px;transition:outline .1s;}
    .cor-circulo.selecionado{outline-color:#6366f1;}

    .mb14{margin-bottom:14px;}
    .mb20{margin-bottom:20px;}
    .mt16{margin-top:16px;}
    .flex-row{display:flex;align-items:center;gap:14px;}
    .flex-1{flex:1;}
    .oculto{display:none;}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div style="font-size:48px;margin-bottom:16px;">💙</div>
  <h1>Saúde Pessoal</h1>
  <p>Seu prontuário familiar<br/>salvo com segurança no Google Drive</p>
  <button onclick="iniciarLogin()" style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px 24px;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"/>
    Entrar com Google
  </button>
</div>

<!-- APP -->
<div id="app" class="oculto">
  <!-- Header -->
  <div class="header">
    <div class="flex-row" style="gap:8px;">
      <button class="btn-back oculto" id="btn-voltar" onclick="voltar()">‹</button>
      <div>
        <div class="header-title" id="header-titulo">💙 Saúde Pessoal</div>
        <div class="header-sub" id="header-sub">☁️ Google Drive conectado</div>
      </div>
    </div>
    <button class="btn-sm oculto" id="btn-sync" onclick="sincronizar()">↑ Sync</button>
  </div>

  <!-- Conteúdo -->
  <div class="content">

    <!-- TELA HOME -->
    <div id="tela-home">
      <div class="hero">
        <div style="font-size:28px;margin-bottom:4px;">💙</div>
        <div class="hero-title">Prontuário<br/><em>Pessoal</em></div>
        <div class="hero-count" id="hero-count">0 perfis • 0 documentos</div>
      </div>
      <div class="label">Perfis da família</div>
      <div id="lista-perfis"></div>
      <button class="btn" onclick="irTela('add-perfil')">+ Adicionar Perfil</button>
    </div>

    <!-- TELA DOCS -->
    <div id="tela-docs" class="oculto">
      <div id="perfil-card" class="card mt16 flex-row" style="background:linear-gradient(135deg,#eef2ff,#f0fdf4);border:1.5px solid #c7d2fe;"></div>
      <div class="filtros" id="filtros"></div>
      <div id="lista-docs"></div>
      <button class="btn" onclick="irTela('add-doc')" style="margin-top:6px;">+ Adicionar Documento</button>
    </div>

    <!-- TELA ADD DOC -->
    <div id="tela-add-doc" class="oculto">
      <div style="font-family:'Lora',serif;font-size:20px;font-weight:600;margin:16px 0 20px;">Novo Documento</div>
      <div class="mb14"><label class="label">Nome / Descrição *</label><input class="input" id="doc-nome" placeholder="Ex: Hemograma completo"/></div>
      <div class="mb14"><label class="label">Categoria</label>
        <select class="input" id="doc-cat">
          <option value="exame">🧪 Exame</option>
          <option value="bioimpedancia">⚖️ Bioimpedância</option>
          <option value="atestado">📋 Atestado</option>
          <option value="receita">💊 Receita</option>
          <option value="outro">📎 Outro</option>
        </select>
      </div>
      <div class="mb14"><label class="label">Data do documento</label><input class="input" id="doc-data" type="date"/></div>
      <div class="mb14"><label class="label">Observações</label><textarea class="input" id="doc-obs" style="min-height:80px;resize:vertical;" placeholder="Médico, resultado…"></textarea></div>
      <div class="mb20">
        <label class="label">Arquivo (PDF, imagem…)</label>
        <input type="file" id="doc-arquivo" accept="image/*,.pdf" style="display:none;" onchange="lerArquivo(this)"/>
        <button class="btn btn-outline" onclick="document.getElementById('doc-arquivo').click()" id="btn-arquivo">📂 Selecionar arquivo</button>
      </div>
      <button class="btn" onclick="salvarDoc()">Salvar documento</button>
    </div>

    <!-- TELA ADD PERFIL -->
    <div id="tela-add-perfil" class="oculto">
      <div style="font-family:'Lora',serif;font-size:20px;font-weight:600;margin:16px 0 20px;">Novo Perfil</div>
      <div class="mb14"><label class="label">Nome completo *</label><input class="input" id="perfil-nome" placeholder="Ex: Renata Silva"/></div>
      <div class="mb14"><label class="label">Data de nascimento</label><input class="input" id="perfil-nasc" type="date"/></div>
      <div class="mb14"><label class="label">Sexo</label>
        <select class="input" id="perfil-sexo">
          <option value="">Preferir não dizer</option>
          <option value="Feminino">Feminino</option>
          <option value="Masculino">Masculino</option>
          <option value="Outro">Outro</option>
        </select>
      </div>
      <div class="mb20">
        <label class="label">Cor do avatar</label>
        <div class="cor-picker" id="cor-picker"></div>
        <div id="avatar-preview"></div>
      </div>
      <button class="btn" onclick="salvarPerfil()">Criar perfil</button>
    </div>

  </div>

  <!-- Nav -->
  <nav class="nav" id="nav-bar">
    <button class="nav-btn ativo" id="nav-home" onclick="irTela('home')"><span>🏠</span>Perfis</button>
    <button class="nav-btn oculto" id="nav-docs" onclick="irTela('docs')"><span>📁</span>Documentos</button>
    <button class="nav-btn oculto" id="nav-novo" onclick="irTela('add-doc')"><span>➕</span>Novo</button>
    <button class="nav-btn" onclick="sincronizar()"><span>☁️</span>Drive</button>
  </nav>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CLIENT_ID = "872104274431-4k5603k842orhjkktu1h0db0bk6n55og.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/drive.appdata";
const ARQUIVO_NOME = "saude_pessoal.json";
const CORES = ["#ef4444","#f97316","#eab308","#22c55e","#0ea5e9","#6366f1","#ec4899","#14b8a6"];
const CATS = {
  exame:         { label:"Exame",        icon:"🧪", color:"#0ea5e9" },
  bioimpedancia: { label:"Bioimpedância",icon:"⚖️", color:"#8b5cf6" },
  atestado:      { label:"Atestado",     icon:"📋", color:"#f59e0b" },
  receita:       { label:"Receita",      icon:"💊", color:"#ec4899" },
  outro:         { label:"Outro",        icon:"📎", color:"#64748b" },
};

// ── Estado ───────────────────────────────────────────────────────────────────
let dados = { perfis:[], docs:[] };
let perfilAtivo = null;
let telaAtual = "home";
let filtroAtual = "all";
let arquivoSelecionado = { data:null, nome:null };
let corSelecionada = 0;
let accessToken = null;
let driveFileId = null;

// ── Google Login ──────────────────────────────────────────────────────────────
function onGoogleLogin(response) {
  // Salva o credential e solicita token do Drive via redirect
  localStorage.setItem('id_token_temp', response.credential);
  solicitarTokenDrive();
}

function solicitarTokenDrive() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (tokenResponse) => {
      if (tokenResponse.access_token) {
        accessToken = tokenResponse.access_token;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').classList.remove('oculto');
        await carregarDados();
        renderHome();
      }
    },
  });
  // Usar redirect ao invés de popup
  client.requestAccessToken({ prompt: '' });
}

// Tenta auto-login se já teve sessão
function tentarAutoLogin() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    prompt: '',
    callback: async (tokenResponse) => {
      if (tokenResponse.access_token) {
        accessToken = tokenResponse.access_token;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').classList.remove('oculto');
        await carregarDados();
        renderHome();
      }
    },
  });
  client.requestAccessToken({ prompt: 'none' });
}

// ── Drive API ─────────────────────────────────────────────────────────────────
async function buscarArquivoDrive() {
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${ARQUIVO_NOME}'&fields=files(id,name)`,
    { headers: { Authorization: `Bearer ${accessToken}` } }
  );
  const j = await r.json();
  return j.files && j.files.length > 0 ? j.files[0].id : null;
}

async function carregarDados() {
  try {
    driveFileId = await buscarArquivoDrive();
    if (!driveFileId) { mostrarToast("Bem-vindo! Crie seu primeiro perfil 👋","#6366f1",4000); return; }
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    dados = await r.json();
    if (dados.perfis?.length) perfilAtivo = dados.perfis[0];
    mostrarToast("Dados carregados ✓","#22c55e");
  } catch(e) { mostrarToast("Erro ao carregar dados","#ef4444"); }
}

async function salvarDados() {
  atualizarSubtitulo("⟳ Salvando…");
  try {
    const body = JSON.stringify(dados);
    const blob = new Blob([body], { type:"application/json" });
    const meta = { name: ARQUIVO_NOME, parents: driveFileId ? undefined : ["appDataFolder"] };

    let url, method;
    if (driveFileId) {
      url = `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`;
      method = "PATCH";
    } else {
      url = "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
      method = "POST";
    }

    const form = new FormData();
    form.append("metadata", new Blob([JSON.stringify(meta)], {type:"application/json"}));
    form.append("file", blob);

    const r = await fetch(url, { method, headers: { Authorization:`Bearer ${accessToken}` }, body: form });
    const j = await r.json();
    if (j.id) driveFileId = j.id;
    mostrarToast("Salvo no Drive ✓","#22c55e");
  } catch(e) { mostrarToast("Erro ao salvar","#ef4444"); }
  atualizarSubtitulo("☁️ Google Drive conectado");
}

// ── UI Helpers ────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function iniciais(n=""){ return n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase(); }
function fmtData(iso){ return iso ? new Date(iso).toLocaleDateString("pt-BR") : ""; }

function criarAvatar(nome, corIdx, tam=44) {
  const bg = CORES[corIdx % CORES.length];
  return `<div class="avatar" style="width:${tam}px;height:${tam}px;background:${bg};font-size:${tam*0.36}px;box-shadow:0 2px 10px ${bg}55;">${iniciais(nome)}</div>`;
}

function criarPill(color, texto) {
  return `<span class="pill" style="background:${color}18;border:1px solid ${color}33;color:${color};">${texto}</span>`;
}

function mostrarToast(msg, cor="#6366f1", ms=3000) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg; t.style.background = cor; t.style.display='block';
  setTimeout(()=>{ t.style.display='none'; }, ms);
}

function mostrarSpinner() {
  ['home','docs','add-doc','add-perfil'].forEach(t => {
    document.getElementById('tela-'+t).classList.add('oculto');
  });
  let sp = document.getElementById('spinner-global');
  if (!sp) {
    sp = document.createElement('div');
    sp.id = 'spinner-global';
    sp.className = 'spinner';
    sp.innerHTML = '<div class="spinner-circle"></div><div class="spinner-txt">Carregando do Drive…</div>';
    document.querySelector('.content').prepend(sp);
  }
  sp.style.display = 'flex';
}
function ocultarSpinner() {
  const sp = document.getElementById('spinner-global');
  if (sp) sp.style.display = 'none';
}

function atualizarSubtitulo(txt) { document.getElementById('header-sub').textContent = txt; }

function sincronizar() { salvarDados(); }

// ── Navegação ─────────────────────────────────────────────────────────────────
function irTela(tela) {
  ['home','docs','add-doc','add-perfil'].forEach(t => {
    document.getElementById('tela-'+t).classList.add('oculto');
  });
  document.getElementById('tela-'+tela).classList.remove('oculto');
  telaAtual = tela;

  // Header
  const titulos = { home:"💙 Saúde Pessoal", docs: perfilAtivo?.nome||"Documentos", "add-doc":"Novo Documento", "add-perfil":"Novo Perfil" };
  document.getElementById('header-titulo').textContent = titulos[tela];

  // Botão voltar
  const voltarBtn = document.getElementById('btn-voltar');
  voltarBtn.classList.toggle('oculto', tela==='home');

  // Sync btn
  document.getElementById('btn-sync').classList.toggle('oculto', tela!=='home');

  // Nav
  document.getElementById('nav-home').className = 'nav-btn' + (tela==='home'?' ativo':'');
  document.getElementById('nav-docs').className = 'nav-btn' + (tela==='docs'?' ativo':'') + (perfilAtivo?'':' oculto');
  document.getElementById('nav-novo').className = 'nav-btn' + (tela==='add-doc'?' ativo':'') + (perfilAtivo?'':' oculto');

  if (tela==='docs') renderDocs();
  if (tela==='home') renderHome();
  if (tela==='add-perfil') renderCorPicker();
}

function voltar() {
  if (telaAtual==='add-doc') irTela('docs');
  else irTela('home');
}

// ── Render Home ───────────────────────────────────────────────────────────────
function renderHome() {
  document.getElementById('hero-count').textContent =
    `${dados.perfis.length} perfil${dados.perfis.length!==1?'s':''} • ${dados.docs.length} documento${dados.docs.length!==1?'s':''}`;

  const lista = document.getElementById('lista-perfis');
  if (!dados.perfis.length) {
    lista.innerHTML = `<div class="card" style="text-align:center;color:#94a3b8;padding:28px;font-size:13px;">Nenhum perfil ainda. Adicione o primeiro! 👇</div>`;
    return;
  }
  lista.innerHTML = dados.perfis.map(p => {
    const ndocs = dados.docs.filter(d=>d.perfilId===p.id).length;
    const ativo = perfilAtivo?.id===p.id;
    return `<div class="card flex-row ${ativo?'ativo':''}" onclick="selecionarPerfil('${p.id}')" style="cursor:pointer;">
      ${criarAvatar(p.nome, p.corIdx)}
      <div class="flex-1">
        <div style="font-weight:800;font-size:15px;">${p.nome}</div>
        <div style="font-size:12px;color:#94a3b8;margin-top:2px;">${p.nascimento?fmtData(p.nascimento):'Sem data'}${p.sexo?' • '+p.sexo:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        ${criarPill('#6366f1', ndocs+' docs')}
        <span style="font-size:18px;color:#94a3b8;">›</span>
      </div>
    </div>`;
  }).join('');
}

function selecionarPerfil(id) {
  perfilAtivo = dados.perfis.find(p=>p.id===id);
  irTela('docs');
}

// ── Render Docs ───────────────────────────────────────────────────────────────
function renderDocs() {
  // Card do perfil
  const pc = document.getElementById('perfil-card');
  pc.innerHTML = `${criarAvatar(perfilAtivo.nome, perfilAtivo.corIdx, 50)}
    <div class="flex-1">
      <div style="font-weight:800;font-size:16px;">${perfilAtivo.nome}</div>
      <div style="font-size:12px;color:#475569;">${perfilAtivo.nascimento?fmtData(perfilAtivo.nascimento):''}${perfilAtivo.sexo?' • '+perfilAtivo.sexo:''}</div>
    </div>
    <button class="btn-delete" onclick="removerPerfil('${perfilAtivo.id}')">🗑</button>`;

  // Filtros
  const filtros = document.getElementById('filtros');
  const todos = [{id:'all',label:'Todos',icon:'📂',color:'#64748b'}, ...Object.entries(CATS).map(([id,c])=>({id,...c}))];
  filtros.innerHTML = todos.map(c =>
    `<button class="filtro-btn ${filtroAtual===c.id?'ativo':''}" style="--cor:${c.color}" onclick="setFiltro('${c.id}')">${c.icon} ${c.label}</button>`
  ).join('');

  // Docs
  renderListaDocs();
}

function setFiltro(f) { filtroAtual = f; renderDocs(); }

function renderListaDocs() {
  const docsFiltrados = dados.docs
    .filter(d=>d.perfilId===perfilAtivo?.id)
    .filter(d=>filtroAtual==='all'||d.categoria===filtroAtual);

  const lista = document.getElementById('lista-docs');
  if (!docsFiltrados.length) {
    lista.innerHTML = `<div class="card" style="text-align:center;color:#94a3b8;padding:28px;font-size:13px;">Nenhum documento nesta categoria.</div>`;
    return;
  }
  lista.innerHTML = docsFiltrados.map(doc => {
    const cat = CATS[doc.categoria]||CATS.outro;
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;">
            ${criarPill(cat.color, cat.icon+' '+cat.label)}
            ${doc.data?`<span style="font-size:11px;color:#94a3b8;font-weight:700;">${fmtData(doc.data)}</span>`:''}
          </div>
          <div style="font-weight:800;font-size:14px;margin-bottom:4px;">${doc.nome}</div>
          ${doc.obs?`<div style="font-size:12px;color:#475569;line-height:1.5;">${doc.obs}</div>`:''}
          ${doc.fileName?`<a href="${doc.fileData}" download="${doc.fileName}" style="display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:12px;color:#6366f1;text-decoration:none;font-weight:700;">📎 ${doc.fileName}</a>`:''}
        </div>
        <button class="btn-delete" onclick="removerDoc('${doc.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ── Perfis ────────────────────────────────────────────────────────────────────
function renderCorPicker() {
  const picker = document.getElementById('cor-picker');
  picker.innerHTML = CORES.map((c,i) =>
    `<div class="cor-circulo ${corSelecionada===i?'selecionado':''}" style="background:${c};" onclick="selecionarCor(${i})"></div>`
  ).join('');
  atualizarPreviewAvatar();
}

function selecionarCor(i) { corSelecionada = i; renderCorPicker(); }

function atualizarPreviewAvatar() {
  const nome = document.getElementById('perfil-nome')?.value||'';
  const prev = document.getElementById('avatar-preview');
  if (nome && prev) prev.innerHTML = criarAvatar(nome, corSelecionada, 56);
}

function salvarPerfil() {
  const nome = document.getElementById('perfil-nome').value.trim();
  if (!nome) { mostrarToast("Digite o nome!","#ef4444"); return; }
  const p = {
    id: uid(), nome,
    nascimento: document.getElementById('perfil-nasc').value,
    sexo: document.getElementById('perfil-sexo').value,
    corIdx: corSelecionada,
  };
  dados.perfis.push(p);
  if (!perfilAtivo) perfilAtivo = p;
  salvarDados();
  document.getElementById('perfil-nome').value='';
  document.getElementById('perfil-nasc').value='';
  document.getElementById('perfil-sexo').value='';
  irTela('home');
}

function removerPerfil(id) {
  if (!confirm("Remover este perfil e todos os seus documentos?")) return;
  dados.perfis = dados.perfis.filter(p=>p.id!==id);
  dados.docs = dados.docs.filter(d=>d.perfilId!==id);
  perfilAtivo = dados.perfis[0]||null;
  salvarDados();
  irTela('home');
}

// ── Documentos ────────────────────────────────────────────────────────────────
function lerArquivo(input) {
  const f = input.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    arquivoSelecionado = { data: e.target.result, nome: f.name };
    document.getElementById('btn-arquivo').textContent = '📎 ' + f.name;
  };
  reader.readAsDataURL(f);
}

function salvarDoc() {
  const nome = document.getElementById('doc-nome').value.trim();
  if (!nome) { mostrarToast("Digite o nome!","#ef4444"); return; }
  const doc = {
    id: uid(), perfilId: perfilAtivo.id,
    nome, categoria: document.getElementById('doc-cat').value,
    data: document.getElementById('doc-data').value,
    obs: document.getElementById('doc-obs').value,
    fileData: arquivoSelecionado.data,
    fileName: arquivoSelecionado.nome,
    criadoEm: new Date().toISOString(),
  };
  dados.docs.push(doc);
  salvarDados();
  // limpar
  document.getElementById('doc-nome').value='';
  document.getElementById('doc-data').value='';
  document.getElementById('doc-obs').value='';
  document.getElementById('btn-arquivo').textContent='📂 Selecionar arquivo';
  arquivoSelecionado = { data:null, nome:null };
  irTela('docs');
}

function removerDoc(id) {
  if (!confirm("Remover este documento?")) return;
  dados.docs = dados.docs.filter(d=>d.id!==id);
  salvarDados();
  renderListaDocs();
}

// ── Login direto ─────────────────────────────────────────────────────────────
function iniciarLogin() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (tokenResponse) => {
      if (tokenResponse.access_token) {
        accessToken = tokenResponse.access_token;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').classList.remove('oculto');
        await carregarDados();
        renderHome();
      }
    },
  });
  client.requestAccessToken({ prompt: 'select_account' });
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('perfil-nome')?.addEventListener('input', atualizarPreviewAvatar);
</script>

</body>
</html>
